services:
  db:
    image: postgres:16
    container_name: inspect_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: openloong
      POSTGRES_PASSWORD: openloongINSPECTCONFIG
      POSTGRES_DB: inspect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

volumes:
  pgdata:
