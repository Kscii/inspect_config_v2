# config.yaml
# ==============================================================================
# 统一配置文件（单一事实源）
# 目标：
# 1) 所有 step 的配置集中管理，便于扩展/新增 step
# 2) 保持与重构前功能与配置项 100% 对齐（不减少配置项）
# 3) 运行时构型列表不在这里配置：由 download 自动发现并完成任务分组落盘
# 4) 遇到异常要能及时上报并中断：后续由 runner/step 统一实现
# ==============================================================================

version: 1

# ==============================================================================
# 全局配置（所有 step 可共享）
# ==============================================================================
global:
  obsutilconfig_paths:
    shanghai: /home/app-dev/.obsutilconfig_shanghai
    zhengzhou: /home/app-dev/.obsutilconfig_zhengzhou

  # 全局环境预设（dev/prod 两套 URL/OBS 基本不需要改）
  # 说明：每个需要“环境差异”的 step 只需要配置自己的 current_preset（dev 或 prod）
  steps_to_run:
    - download
    - selectors
    - collect
    - find_range
    - find_range_full
    - test_range
    - generate_db_csv
    - import_db
    - visualize_db
    - pack_csv
    - build_sql
    - update_rule_obs  
    - update_rule_api

  presets:
    shanghai_prod:
      env: prod
      region: shanghai
      base_url: https://dojo-api.openloong.org.cn
      obs_bucket: openloong-apps-prod-private

    shanghai_dev:
      env: dev
      region: shanghai
      base_url: https://dev-dojo-api.openloong.org.cn
      obs_bucket: openloong-apps-dev-private

    zhengzhou_prod:
      env: prod
      region: zhengzhou
      base_url: https://dojo-api-zz.openloong.org.cn
      obs_bucket: openloong-zhengzhou-apps-private

  # 统一日志目录名（落在 repo 根目录下）
  log_dirname: "log"

  # 日志模式：
  # - normal：尽量保持你原来“console log/打印”的格式与信息量（默认）
  # - debug ：输出更详细信息（包含更多上下文、更多步骤细节、更完整异常栈等）
  log_mode: "normal"   # "normal" | "debug"

  # 全局 dry-run（演练模式）
  # 说明：若为 true，runner 会尽量要求各 step 不产生破坏性动作；
  #       同时各 step 仍保留自己的 DRY_RUN 配置（后续代码会做 OR 合并）
  dry_run: false

  # 是否允许继续执行后续 step（全局容错）
  # - false：任一步失败立即中断（推荐，符合你“及时上报和中断流程”）
  # - true ：记录错误并继续（仅调试时可能用）
  continue_on_error: false


  rule_id_to_model_presets:
    shanghai_dev:
      175: "A2"
      176: "A2D"
      177: "DWHEEL-TACTILE"
      178: "FRANKA"
