      180: "UR"
      182: "COBOTMAGICV2.0"
      183: "KUAVO_4PRO_GRIPPER"
      187: "S1"
      188: "PIKA"
      189: "R1"
      190: "QINGLOONGV2.5"
      191: "QINGLOONGV2.5-TACTILE"
      194: "BUTLERV3"
      181: "青龙"
      # 184: "KUAVO_4PRO_LB_GRIPPER_DEXHAND"
      185: "KUAVO_4PRO_LB_GRIPPER"  
      # 186: "KUAVO_4PRO_GRIPPER_DEXHAND"
    shanghai_prod:
      187: "BUTLERV3"
      188: "QINGLOONGV2.5-TACTILE"
      189: "QINGLOONGV2.5"
      190: "R1"
      191: "PIKA"
      192: "S1"
      196: "KUAVO_4PRO_GRIPPER"
