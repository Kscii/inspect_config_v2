# ==============================================================================
# Step: download（负责：下载/搬运/合并/分组；并自动发现构型）
# ==============================================================================
download:
  # 当前使用哪个预设（prod_all/shanghai_dev/shanghai_prod/zhengzhou_prod）
  current_preset: "shanghai_dev"

  prod_all_presets: [shanghai_prod, zhengzhou_prod]

  # OBS 前缀（末尾带 / 不带都行）
  obs_prefix: "data-collector-svc/collect/"

  # obsutil 并行参数：用于提升下载速度
  parallel: 16
  jobs: 16

  # 是否强制覆盖 obsutil cp（等价于 obsutil 的 -f）
  force: true

  # obsutil 可执行文件：留空表示用 PATH 里的 obsutil
  # e.g. "C:\\path\\to\\obsutil.exe"
  obsutil_exe: null

  # pipeline 期望目录：repo_dir/obs_download
  # 说明：download 最终会把任务分组搬运到这个目录下，供后续 steps 读取
  obs_download_rootname: "obs_download"

  # 开启后：不重新下载，只做“搬运/合并 + 分组 + 写 log”
  # 说明：适合你已经有 collect 落盘，想重新分组/刷新 obs_download 的场景
  skip_download: false

  # True：完全覆盖过去的 obs_download（不考虑已存在内容，保证全量更新）
  # 说明：你之前提到的“完全覆盖 collect 和 obs_download”的核心开关之一
  full_refresh: true

  # 当无法从数据中识别构型（model）时使用的兜底构型名
  # 说明：最终会把该任务移动到 obs_download/_MODEL_MISSING_/...
  default_model_if_missing: "_MODEL_MISSING_"

  # 是否只演练（不实际移动/不实际下载）
  # 说明：用于安全验证逻辑；如果 global.dry_run=true，这里也会被视为 true（后续代码实现）
  dry_run: false

  # Windows Defender/占用导致 PermissionError 时的重试次数
  move_retries: 8

  # 可选：只处理像 taskid 的目录（32 位 hex）。想更宽松就设为 False
  filter_taskid_dirs: false

  # 非法 Windows 文件名字符的正则（用于路径清洗/兼容）
  illegal_win_pattern: "[<>:\"/\\\\|?*\\x00-\\x1F]"

  # taskid 目录名正则（默认 32 位 hex）
  taskid_regex: '^[0-9a-f]{32}$'

  # 是否启用 CSV 读取模式
  # - false: 使用 obs_prefix 单一路径下载（原模式）
  # - true : 读取 CSV，多路径下载（taskid list 模式）
  csv_mode: false

  # CSV 文件路径（相对 repo_root 或绝对路径都可）
  csv_path: "task_id.csv"

  # CSV 中 taskid 所在列名（支持带表头的 CSV）
  # 如果你的 CSV 没有表头，可以设为 null，并使用 csv_col_index
  csv_col_name: "task_id"

  # CSV 列索引（0-based），仅当 csv_col_name 为 null 时生效
  csv_col_index: 0

  # 是否跳过首行（仅当你没有表头但第一行是说明时用）
  csv_skip_header: false

  # 拼接方式：obs_prefix(作为 base) + taskid + "/"
  # true: 每行视作 taskid，拼成 data-collector-svc/collect/<taskid>/
  # false: 每行视作完整 prefix（更通用，但你现在主要用 true）
  csv_rows_are_taskid: true



# ==============================================================================
# Step: selectors（负责：生成 selector 列表 + 过滤规则）
# ==============================================================================
selectors:
  # -------------------------
  # 规则 0：旧白名单（基于 .<> 内容）
  # -------------------------
  angle_allowlist:
    # frame_align
    - "start_diff_average_ms"
    - "start_diff_joint_average_ms"
    - "start_diff_camera_average_ms"
    - "end_diff_average_ms"
    - "end_diff_joint_average_ms"
    - "end_diff_camera_average_ms"
    - "delay_earliest_ms"
    - "advance_latest_ms"
    # frame_count
    - "jitter_std_ms"
    - "jitter_std_frames"
    - "max_interval_ms"
    - "max_interval_frames"

  # -------------------------
  # 规则 1：新白名单（基于 selector 字符串本身）
  # -------------------------
  # 双层列表：每个内层至少 2 个字符串
  # 命中规则：只要 **所有字符串都在同一个 selector 中出现** 即命中（不要求相邻）
  charseq_allowlist:
    - ["frame_count", ".<fps>"]                         # frame_count
    - ["arm", "拟合评分"]                                # frame_fit
    - ["shoulder", "拟合评分"]          # frame_fit
    - ["elbow", "拟合评分"] 
    - ["wrist", "拟合评分"] 
    - ["camera_static_interval", ".<total_second_sum>"]  # camera_static_interval
    - ["joint_motion_interval", ".<total_second_sum>"]   # joint_static_interval
    - ["[<ruleCode>=<metadata_raw>]", "<rawDataMetric>"] # metadata_raw
    - [".<loss_pp>", ".[<loss_num>=<total>]"]  # frame_align

  # 新白名单匹配模式：
  # - both     : 所有 seg 都出现在 selector 中（不要求顺序/相邻）
  # - ordered  : 按列表顺序依次出现（中间允许有其它字符）
  # - adjacent : 必须出现 seg1+seg2+... 的连续子串（严格）
  charseq_match_mode: "both"

  # 新白名单匹配是否区分大小写
  charseq_case_sensitive: true

  # -------------------------
  # 规则 2：黑名单（基于 contains 匹配，可指定构型）
  # -------------------------
  angle_blocklist:
    - models: ["PIKA"]
      contains: ["effort"]

    - models: ["PIKA"]
      contains: ["velocity"]

    # - models: ["QINGLOONGV2.5","R1","S1","UR"]
    #   contains: ["report"]

    - models: ["A2D"]
      contains: ["waist"]


  # -------------------------
  # 执行顺序（可配置）
  # -------------------------
  filter_order:
    - "angle_allow_add"
    - "char_allow_add"
    - "angle_block_exclude"

  # -------------------------
  # 各规则开关 & 匹配模式
  # -------------------------
  # angle_allowlist 的匹配模式（exact/contains 等，按你原实现支持的取值来）
  angle_match_mode: "exact"

  # angle_blocklist 的匹配模式（exact/contains 等，按你原实现支持的取值来）
  angle_block_match_mode: "exact"

  # 总开关：是否启用过滤器
  enable_filter: true

  # 各子规则开关
  enable_angle_allow_add: true
  enable_charseq_allow_add: true
  enable_angle_block_exclude: true

  # 当两个 allowlist 都为空时，是否允许“全放行”
  allow_all_if_no_allowlists: true

  # 并集模式
  use_union_of_all_samples: false

  # 并集模式下的最小样本数过滤
  enable_union_min_sample_filter: false
  
  # 全局默认阈值：字段至少在 N 个样本中出现才保留
  union_min_sample_count: 300
  
  # 按构型覆盖阈值（可选）
  # union_min_sample_count_by_model:
    # "构型": 10

  # 随机一致性检查（只在 generate_selectors_txt 时触发）
  enable_random_consistency_check: false

  # 随机抽样“不同 taskid 目录”的数量（每个 task 取 1 个 json）
  consistency_sample_tasks: 100

  # 随机种子：保证可复现（不想固定就设为 null）
  consistency_random_seed: 0

  # mismatch 时最多展示多少条差异 selector（避免刷屏）
  consistency_diff_preview: 5


# ==============================================================================
# Step: collect（负责：从 json 中按 selector 收集值，输出 values.csv）
# ==============================================================================
collect:
  # 是否开启“单文件输出”模式
  # - false：每个 selector 一个 CSV（file,value）
  # - true ：只输出一个 CSV（file, <selector1>, <selector2>, ...）
  single_file_mode: true

  # 扫描哪些文件（默认所有 .json）
  json_suffix: ".json"

  # CSV 编码（Windows Excel 兼容通常用 utf-8-sig）
  csv_encoding: "utf-8-sig"

  # 是否写 CSV 表头
  csv_write_header: true

  # CSV 中“文件名字段”的写法
  # - basename ：只写文件名（不含目录）
  # - relative ：写相对路径（相对 obs_download/<model>/...）
  filename_in_csv: "basename"

  # 严格模式
  # - true ：遇到错误直接抛异常（runner 捕获后中断）
  # - false：失败返回 None 或跳过（按你原逻辑）
  strict_mode: false


# ==============================================================================
# Step: find_range（负责：根据 values.csv 估计区间，输出 ranges.csv）
# ==============================================================================
find_range:
  method: "cover"          # "iqr" / "mad" / "cover"
  iqr_k: 1.5
  mad_z: 3.0
  cover_pct: 0.95

  min_valid_count: 2
  clamp_to_observed: true
  round_decimals: 6
  expand_pct: 1

  # 默认：同号约束 -> 扩张 -> 字段约束
  step_order: ["sign", "expand", "field"]

  sign_consistency_clamp: true
  post_expand_sign_clamp: true

  non_numeric_mark: "true"

  force_non_numeric_field_rules:
    - contains: ["metadata_raw"]

  field_range_rules:
    - contains: ["拟合评分"]
      min_lo: 50
      max_lo: 75
      min_hi: 100
      max_hi: 100

    - contains: ["delay_earliest_ms"]
      min_lo: 0
      max_lo: 0

    - contains: ["advance_latest_ms"]
      min_hi: 0
      max_hi: 0

    - contains: ["delay_earliest_ms"]
      min_lo: 0
      max_lo: 0

    - contains: ["camera_static_interval"]
      min_lo: 0
      max_lo: 0
      min_hi: 0
      max_hi: 0

    - contains: ["joint_motion_interval"]
      min_lo: 0.1
      max_lo: 0.1
      min_hi: 10000
      max_hi: 10000

    - contains: ["color>].<rawData>.<fps>"]
      min_lo: 25
      max_lo: 25
      min_hi: 35
      max_hi: 35

    - contains: ["depth>].<rawData>.<fps>"]
      min_lo: 25
      max_lo: 25
      min_hi: 35
      max_hi: 35

    - contains: [".<max_interval_ms>"]
      min_lo: 0
      max_lo: 0

    - contains: [".<max_interval_frames>"]
      min_lo: 0
      max_lo: 0

    - models: ["GR2"]
      contains: [".<loss_pp>"]
      min_lo: 0
      max_lo: 0
      min_hi: 2.5
      max_hi: 2.5

    - models: ["GR2"]
      contains: [".<rawData>.<fps>", "/cameras"]
      min_lo: 22
      max_lo: 22
      min_hi: 35
      max_hi: 35

    - models: ["KUAVO_4PRO_GRIPPER"]
      contains: [".<loss_pp>"]
      min_lo: 0
      max_lo: 0
      min_hi: 5
      max_hi: 5

    - models: ["QINGLOONGV2.5"]
      contains: ["color>].<rawData>.<fps>"]
      min_lo: 50
      max_lo: 50
      min_hi: 70
      max_hi: 70

    - models: ["QINGLOONGV2.5"]
      contains: ["depth>].<rawData>.<fps>"]
      min_lo: 50
      max_lo: 50
      min_hi: 70
      max_hi: 70

    - models: ["DWHEEL-TACTILE"]
      contains: ["color>].<rawData>.<fps>"]
      min_lo: 30
      max_lo: 30
      min_hi: 35
      max_hi: 35

    - models: ["DWHEEL-TACTILE"]
      contains: ["depth>].<rawData>.<fps>"]
      min_lo: 30
      max_lo: 30
      min_hi: 35
      max_hi: 35

  field_rule_case_insensitive: true
  field_rule_model_case_insensitive: true
  apply_all_matching_rules: true


# ==============================================================================
# Step: find_range_full
# ==============================================================================
find_range_full:
  non_numeric_mark: "true"

  force_non_numeric_field_rules:
    - contains: ["metadata_raw"]

  field_range_rules:
    - contains: ["frame_align","end_diff_average_ms"]
      range: [0, 4000]

    - contains: ["frame_align","end_diff_camera_average_ms"]
      range: [0, 60]

    - contains: ["frame_align","end_diff_joint_average_ms"]
      range: [0, 4000]

    - contains: ["frame_align","start_diff_average_ms"]
      range: [0, 4000]

    - contains: ["frame_align","start_diff_camera_average_ms"]
      range: [0, 60]

    - contains: ["frame_align","start_diff_joint_average_ms"]
      range: [0, 4000]

    - contains: ["frame_align","advance_latest_ms"]
      range: [-200, 0]
    
    - contains: ["frame_align","delay_earliest_ms"]
      range: [0, 4000]

    - contains: ["frame_count","fps"]
      range: [25, 35]

    - contains: ["frame_count","jitter_std_frames"]
      range: [0, 1]

    - contains: ["frame_count","jitter_std_ms"]
      range: [0, 40]

    - contains: ["frame_count","loss_pp"]
      range: [0, 20]

    - contains: ["frame_count","max_interval_frames"]
      range: [0, 20]

    - contains: ["frame_count","max_interval_ms"]
      range: [0, 600]

    - contains: ["frame_fit","拟合评分"]
      range: [70, 100]

    - contains: ["camera_static_interval","total_second_sum"]
      range: [0, 0]

    - contains: ["joint_motion_interval","total_second_sum"]
      range: [0.1, 10000]

  field_rule_case_insensitive: true

# ==============================================================================
# Step: test_range（负责：区间命中检测，写回 ranges.csv 并输出统计）
# ==============================================================================
test_range:
  output_ranges_csv: null
  treat_nan_as_fail: true
  fields_mode: "range_only"

  missing_value_col_is_fail: true
  missing_range_is_fail: false

  show_top_fields: true
  top_n_fields: 5

  show_fail_details: true
  max_fail_details: 1


# ==============================================================================
# Step: generate_db_csv（负责：生成用于导入 PostgreSQL 的 5 个 CSV 文件）
# ==============================================================================
generate_db_csv:
  # JSON 文件后缀过滤
  json_suffix: "_collect.json"

  # CSV 编码
  csv_encoding: "utf-8-sig"

  # 数据库 CSV 输出目录名
  db_dirname: "db"

  # 字段缺失时的默认值
  default_value: "N/A"

  # 表结构配置：为各个 CSV 文件定义额外的列（通过 selector 提取）
  # 说明：
  # - 默认列（如 episode_id, taskid, model, filename 等）会自动生成，无需配置
  # - 只需要配置需要从 JSON 中通过 selector 提取的额外列
  # - 支持的表：episode, field, field_value, thresholds_base, thresholds_full
  table_extra_columns:
    # episode 表的额外列
    episode:
      sn: ".<report>.[<ruleCode>=<metadata_raw>].<rawDataMetric>.[<name>=<metadata.json>].<rawData>.<metadata>.<equipment_info>.<sn>"
      collected_at: ".<report>.[<ruleCode>=<metadata_raw>].<rawDataMetric>.[<name>=<metadata.json>].<rawData>.<metadata>.<collected_at>"
      # 可以继续添加更多列，例如：
      # duration_ms: ".<report>.[<ruleCode>=<metadata_raw>].<rawDataMetric>.[<name>=<metadata.json>].<rawData>.<metadata>.<duration_in_ms>"
      # version: ".<report>.[<ruleCode>=<metadata_raw>].<rawDataMetric>.[<name>=<metadata.json>].<rawData>.<metadata>.<ver>"
    
    # field 表的额外列（如果需要）
    # field:
    #   custom_field: "selector..."
    
    # field_value 表的额外列（如果需要）
    # field_value:
    #   custom_field: "selector..."
    
    # thresholds_base 表的额外列（如果需要）
    # thresholds_base:
    #   custom_field: "selector..."
    
    # thresholds_full 表的额外列（如果需要）
    # thresholds_full:
    #   custom_field: "selector..."

  # 兼容旧配置：metadata_selectors（已废弃，建议使用 table_extra_columns.episode）
  # 如果同时存在，会自动合并到 episode 表
  # metadata_selectors:
  #   sn: "selector..."
  #   collected_at: "selector..."


# ==============================================================================
# Step: import_db（负责：将 CSV 导入到 PostgreSQL 数据库）
# ==============================================================================
import_db:
  # 数据库连接配置
  host: "localhost"
  port: 5432
  database: "inspectdb"
  user: "inspect"
  password: "inspect_pw"

  # 导入策略
  truncate_before_import: true  # 每次导入前清空表
  
  # schema 命名规则（支持 {model} 和 {model_lower} 占位符）
  schema_name_template: "{model_lower}"
  
  # 是否创建表（如果不存在）
  create_tables_if_missing: true
  
  # 是否导入 thresholds_full
  enable_full: true
  
  # db CSV 目录名
  db_dirname: "db"
  
  # 是否演练
  dry_run: false


# ==============================================================================
# Step: pack_csv（负责：把 ranges.csv 转成 ranges.txt）
# ==============================================================================
pack_csv:
  # base:  {model}_ranges.txt
  output_suffix: ".txt"
  # full:  {model}_ranges_full.txt  => 例：A2_ranges_full.txt
  output_suffix_full: "_full.txt"
  enable_full: true


# ==============================================================================
# Step: build_sql（负责：把 ranges.txt 生成 update_rule_config.sql）
# ==============================================================================
build_sql:
  sql_dirname: "sql_output"
  sql_filename: "update_rule_config.sql"
  sql_filename_full: "update_rule_config_full.sql"
  csv_output_dirname: "csv_output"
  fail_if_missing: true
  enable_full: true


# ==============================================================================
# Step: update_rule_obs（负责：把 ranges.csv 上传到 OBS 固定路径，不覆盖）
# ==============================================================================
update_rule_obs:
  # shanghai_prod/shanghai_dev/zhengzhou_prod/zhengzhou_dev
  current_preset: "shanghai_dev"

  # obsutil 可执行文件：null 表示用 PATH 中的 obsutil
  obsutil_exe: null

  # obsutil 并行参数（可选）
  parallel: 8
  jobs: 8

  # 是否强制覆盖 obsutil cp
  force: false

  # 是否演练
  dry_run: false
  enable_full: true

  # 目的前缀（支持 {model} 和 {time} 占位符）
  obs_prefix_base: "data-collector-svc/range/{model}/base/{time}"
  obs_prefix_full: "data-collector-svc/range/{model}/full/{time}"

  # 文件名时间戳格式：YYYYMMDD_HHMMSS（不带时区）
  time_format: "%Y%m%d_%H%M%S"

  # csv 输出目录名（用于保存 last_path.txt）
  csv_output_dirname: "csv_output"


# ==============================================================================
# Step: update_rule_api（负责：调用接口更新规则）
# ==============================================================================
update_rule_api:
  # shanghai_prod/shanghai_dev/zhengzhou_prod/zhengzhou_dev
  current_preset: "shanghai_dev"

  put_path: "/data-collector/rule/update"

  # header 名：按你接口要求是 accesstoken
  shanghai_access_token: "PASTE_YOUR_ACCESS_TOKEN_HERE"
  zhengzhou_access_token: "PASTE_YOUR_ACCESS_TOKEN_HERE"

  dry_run: false
  verify_tls: true
  timeout_sec: 30

  csv_output_dirname: "csv_output"
  fail_if_id_missing: true
  fail_if_txt_missing: true
  enable_full: true
  
  # 仅更新 Base Config（跳过 Full Config 和 Path 更新）
  # - true: 只执行 Base Config 更新（仅发送 {"id": xxx, "config": "..."}）
  # - false: 执行完整更新流程（Base + Full + csvPath + csvFullPath）
  only_update_base_config: true


# ==============================================================================
# Step: visualize_db（负责：Plotly Dash 可视化数据库数据）
# ==============================================================================
visualize_db:
  # Dash 服务器配置
  host: "127.0.0.1"
  port: 8050
  debug: false

  # 数据库连接配置（从 import_db 继承）
  db_host: "localhost"
  db_port: 5432
  db_database: "inspectdb"
  db_user: "inspect"
  db_password: "inspect_pw"

  # 图表配置
  max_fields: 5  # 多字段对比最大数量
  chart_height: 600  # 图表高度（px）

  # 导出配置
  export_dir: "exports"  # PNG 导出目录
  export_dpi: 300  # 导出分辨率


